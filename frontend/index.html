<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampEase - Welcome</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="welcome-page">
  <div class="page-shell">
    <div class="app">
      <div class="auth-shell">
        <div class="centered" style="margin-top: 20px;">
          <div style="font-size: 42px;">🏕️</div>
          <h1 class="title-xl" style="font-size: 38px; margin-top: 16px;">CampEase</h1>
          <p class="subtitle">Discover camping spots across the UAE</p>
        </div>

        <div class="card hero-card" style="margin-top: 26px; padding: 0; overflow: hidden;">
          <img
            src="http://localhost:5000/etour/default/1.jpg"
            alt="CampEase Welcome"
            style="width: 100%; height: 260px; object-fit: cover; display: block;"
          />
        </div>

        <button class="btn btn-primary" onclick="window.location.href='signup.html'">Get Started</button>
        <button class="btn btn-secondary" onclick="window.location.href='login.html'">Log In</button>

        <p class="small-text centered" style="margin-top: 20px;">
          By continuing, you agree to our terms
        </p>
      </div>
    </div>
  </div>
</body>
</html>
