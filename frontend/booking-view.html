<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampEase - Booking Details</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="app booking-confirm-layout">
      <div class="topbar">
        <button class="icon-btn" onclick="history.back()">←</button>
        <div class="brand">Booking Details</div>
        <button class="icon-btn" onclick="window.location.href='notifications.html'">🔔</button>
      </div>

      <div class="card section-card">
        <div class="booking-card-image" id="viewBookingImage">Booking Image</div>

        <div class="row-between" style="margin-bottom: 10px;">
          <div>
            <div class="section-label">Reservation</div>
            <h1 class="title-lg" id="viewBookingName">Loading...</h1>
            <div class="meta" id="viewBookingLocation">UAE</div>
          </div>
          <div>
            <span class="status-pill" id="viewBookingStatus">Confirmed</span>
          </div>
        </div>

        <div class="booking-summary" style="margin-top: 18px;">
          <div class="summary-row">
            <span>Check-In</span>
            <strong id="viewCheckIn">-</strong>
          </div>
          <div class="summary-row">
            <span>Check-Out</span>
            <strong id="viewCheckOut">-</strong>
          </div>
          <div class="summary-row">
            <span>Duration</span>
            <strong id="viewDuration">-</strong>
          </div>
          <div class="summary-row">
            <span>People</span>
            <strong id="viewGuests">-</strong>
          </div>
          <div class="summary-row">
            <span>Special Request</span>
            <strong id="viewSpecialRequest">None</strong>
          </div>
          <div class="summary-row">
            <span>Price</span>
            <strong id="viewPrice">Free</strong>
          </div>
        </div>

        <div id="viewBookingMessage"></div>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="home.html" id="navHome">Home</a>
    <a href="home.html?mode=search" id="navSearch">Search</a>
    <a href="saved.html">Saved</a>
    <a href="bookings.html" class="active">Bookings</a>
    <a href="profile.html">Profile</a>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/booking-view.js"></script>
</body>
</html>
