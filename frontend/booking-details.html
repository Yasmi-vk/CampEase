<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampEase - Booking Details</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="app booking-details-layout">
      <div class="topbar">
        <button class="icon-btn" onclick="history.back()">←</button>
        <div class="brand">Booking Details</div>
        <button class="icon-btn" onclick="window.location.href='notifications.html'">🔔</button>
      </div>

      <div class="card section-card">
        <div class="booking-card-image">Selected Campsite Image</div>

        <div class="row-between" style="margin-bottom: 10px;">
          <div>
            <div class="section-label">CampEase Reservation</div>
            <h1 class="title-lg" id="bookingCampName">Loading...</h1>
            <div class="meta" id="bookingCampLocation">UAE</div>
          </div>
          <div>
            <div class="section-label">Price</div>
            <div class="price" id="bookingBasePrice">Free</div>
          </div>
        </div>
      </div>

      <div class="card section-card">
        <div class="section-label">Enter Booking Details</div>

        <form id="bookingForm" class="edit-form">
          <div class="grid-2">
            <div class="input-group" style="margin-bottom:0;">
              <label class="input-label">Adults</label>
              <input class="input" type="number" id="bookingAdults" min="1" value="2" required />
            </div>

            <div class="input-group" style="margin-bottom:0;">
              <label class="input-label">Children</label>
              <input class="input" type="number" id="bookingChildren" min="0" value="0" required />
            </div>
          </div>

          <div class="input-group" style="margin-bottom:0;">
            <label class="input-label">Check-In Date</label>
            <input class="input" type="date" id="bookingCheckIn" required />
          </div>

          <div class="input-group" style="margin-bottom:0;">
            <label class="input-label">Check-Out Date</label>
            <input class="input" type="date" id="bookingCheckOut" required />
          </div>

          <div class="input-group" style="margin-bottom:0;">
            <label class="input-label">Duration (Days)</label>
            <input class="input" type="number" id="bookingDuration" min="1" readonly />
          </div>

          <div class="section-label" style="margin-top: 8px;">Weather for Selected Dates</div>
          <div id="bookingWeatherBox">
            <div class="small-text">Select your dates to view the forecast.</div>
          </div>
          <button class="btn btn-outline hidden" type="button" id="bookingLoadMoreWeatherBtn" style="margin-top: 12px;">Load More</button>

          <div class="input-group" style="margin-bottom:0;">
            <label class="input-label">Special Request</label>
            <textarea class="input" id="bookingSpecialRequest" rows="4" placeholder="Any special request?"></textarea>
          </div>

          <button class="btn btn-primary" type="submit">Continue</button>
          <div id="bookingDetailsMessage"></div>
        </form>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="home.html" id="navHome">Home</a>
    <a href="home.html?mode=search" id="navSearch">Search</a>
    <a href="saved.html">Saved</a>
    <a href="bookings.html" class="active">Bookings</a>
    <a href="profile.html">Profile</a>
  </div>

  <div class="modal-overlay" id="bookingWeatherModal">
    <div class="modal-sheet">
      <div class="topbar" style="margin-bottom: 10px;">
        <div class="brand">Forecast Details</div>
        <button class="icon-btn" id="closeBookingWeatherModalBtn">✕</button>
      </div>

      <div id="bookingWeatherDetailsContent">
        <div class="small-text">Loading detailed forecast...</div>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/booking-details.js"></script>
</body>
</html>
