<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampEase - Bookings</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-shell">
    <div class="app bookings-layout">
      <div class="topbar">
        <button class="icon-btn" onclick="window.location.href='home.html'">←</button>
        <div class="brand">CampEase</div>
        <button class="icon-btn">✦</button>
      </div>

      <div style="margin-bottom: 18px;">
        <div class="section-label">My Bookings</div>
        <h1 class="title-xl" style="font-size: 32px;">Manage your camping plans</h1>
      </div>

      <div class="booking-tabs">
        <button class="booking-tab active" id="activeTabBtn">Active Bookings</button>
        <button class="booking-tab" id="historyTabBtn">History</button>
      </div>

      <div id="bookingsContainer" class="campsite-list"></div>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="home.html">Home</a>
    <a href="home.html">Search</a>
    <a href="saved.html">Saved</a>
    <a href="bookings.html" class="active">Bookings</a>
    <a href="profile.html">Profile</a>
  </div>

  <div class="modal-overlay" id="cancelBookingModal">
  <div class="modal-sheet">
    <div class="topbar" style="margin-bottom: 10px;">
      <div class="brand">Cancel Booking</div>
      <button class="icon-btn" id="closeCancelBookingModalBtn">✕</button>
    </div>

    <div class="modal-grid">
      <div class="safety-item">
        <strong>Are you sure?</strong>
        <p class="small-text">
          This booking will be moved to your history once cancelled.
        </p>
      </div>

      <div class="row">
        <button class="btn btn-secondary" type="button" id="keepBookingBtn" style="margin-top:0;">Keep Booking</button>
        <button class="btn btn-danger-outline" type="button" id="confirmCancelBookingBtn" style="margin-top:0;">Cancel Booking</button>
      </div>

      <div id="cancelBookingMessage"></div>
    </div>
  </div>
</div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/bookings.js"></script>
</body>
</html>
